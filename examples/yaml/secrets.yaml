# yaml-language-server: $schema=https://cdn.jsdelivr.net/npm/@hubble-ventures/infisicml@2/schema/secrets.schema.json
# YAML is the primary manifest format. `secrets.json` is equally supported —
# see examples/json/secrets.json for the JSON equivalent of this file.
# (The two live in separate directories only because a single package directory
# may hold just one manifest; in a real repo this file sits in the package root.)

# The folder tree: which Infisical folders to pull and, per folder, exactly
# which keys to emit (bare strings) and how to alias them (`SOURCE: TARGET`).
secrets:
  - clerk:
      - CLERK_PUBLISHABLE_KEY: VITE_CLERK_PUBLISHABLE_KEY
  - posthog:
      - POSTHOG_PROJECT_TOKEN: VITE_POSTHOG_KEY
  - stripe:
      - STRIPE_PUBLISHABLE_KEY
      - STRIPE_WEBHOOK_SECRET

# A profile's `secrets` replaces the root `secrets` when running with --profile.
profiles:
  deploy:
    secrets:
      - clerk:
          - CLERK_PUBLISHABLE_KEY: VITE_CLERK_PUBLISHABLE_KEY
      - posthog:
          - POSTHOG_PROJECT_TOKEN: VITE_POSTHOG_KEY
      - stripe:
          - STRIPE_PUBLISHABLE_KEY
          - STRIPE_WEBHOOK_SECRET
      - fly:
          - FLY_API_TOKEN

ci:
  skipWhenEnv:
    - VITE_CLERK_PUBLISHABLE_KEY

environments:
  preview:
    optionalKeys:
      - POSTHOG_PROJECT_TOKEN
      - STRIPE_WEBHOOK_SECRET
