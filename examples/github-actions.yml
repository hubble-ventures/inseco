# Example CI + deploy workflow using infisicml.
#
# Auth is GitHub OIDC ONLY — note `permissions: id-token: write`. There is no
# client-id/secret fallback. The runner mints a short-lived OIDC token, the
# infisicml action exchanges it for an Infisical access token, fetches the
# package's secrets, and masks + appends them to GITHUB_ENV for later steps.

name: deploy-api

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # REQUIRED for OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Loads secrets for the `api` package (its secrets.json) from the
      # Infisical `production` environment into GITHUB_ENV.
      - name: Load Infisical secrets
        uses: hubble-ventures/infisicml/action@v1
        with:
          package-id: api
          environment: production
          profile: deploy # adds deploy-only paths (e.g. /fly)
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          oidc-audience: ${{ vars.INFISICAL_OIDC_AUDIENCE }} # optional

      # Runtime secrets are now in the job env. The advertiseKeys hook also wrote
      # INFISICML_FLY_KEYS=<comma-separated runtime key names> — forward exactly
      # those to the app, so secrets.json stays the source of truth.
      - name: Deploy to Fly
        run: |
          IFS=',' read -ra KEYS <<< "$INFISICML_FLY_KEYS"
          for k in "${KEYS[@]}"; do
            printf '%s=%s\n' "$k" "${!k}"
          done | flyctl secrets import --app my-api
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }} # pulled by the `deploy` profile
