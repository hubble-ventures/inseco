name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run type-check
      - run: npm run build
      # dist/ is committed (git-URL consumers install without a build step).
      # Fail if it drifted from source.
      - name: Verify committed dist is up to date
        run: |
          if ! git diff --exit-code -- dist; then
            echo "::error::dist/ is stale — run 'npm run build' and commit the result"
            exit 1
          fi
      - run: npm test
      # End-to-end smoke of the built CLI against the fixture repo (no live
      # Infisical). GitHub sets CI=true, so `pull` exercises the CI-stub path.
      - name: Smoke test (built CLI)
        run: bash scripts/smoke.sh
