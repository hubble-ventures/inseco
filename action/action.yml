name: Load Infisical secrets (inseco)
description: >-
  Fetch secrets from Infisical into the job environment via inseco export-gha.
  Authentication is GitHub OIDC only — the calling job MUST set
  `permissions: id-token: write`.

inputs:
  package-id:
    description: 'Package id from the inseco registry (e.g. app, api)'
    required: true
  environment:
    description: 'Infisical environment slug (development, preview, production)'
    required: true
  profile:
    description: 'Optional secrets.json profile (e.g. deploy, release)'
    required: false
    default: ''
  project-slug:
    description: 'Infisical project slug'
    required: true
  identity-id:
    description: 'Infisical machine-identity id bound to a GitHub OIDC auth method'
    required: true
  oidc-audience:
    description: 'OIDC audience (must match the identity bound audiences). Overrides inseco.config auth.oidcAudience.'
    required: false
    default: ''
  inseco-version:
    description: 'Version of the inseco npm package to run via npx'
    required: false
    default: 'latest'

runs:
  using: composite
  steps:
    - name: Load secrets into GITHUB_ENV (OIDC)
      shell: bash
      env:
        INFISICAL_PROJECT_SLUG: ${{ inputs.project-slug }}
        INFISICAL_IDENTITY_ID: ${{ inputs.identity-id }}
        INFISICAL_OIDC_AUDIENCE: ${{ inputs.oidc-audience }}
        INFISICAL_ENV_SLUG: ${{ inputs.environment }}
      run: |
        args=(export-gha "${{ inputs.package-id }}" --env "${{ inputs.environment }}")
        if [ -n "${{ inputs.profile }}" ]; then
          args+=(--profile "${{ inputs.profile }}")
        fi
        npx --yes "inseco@${{ inputs.inseco-version }}" "${args[@]}"
